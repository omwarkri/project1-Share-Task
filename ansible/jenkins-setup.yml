---
- name: Install and Configure Jenkins
  hosts: jenkins
  vars:
    jenkins_port: 8080
    jenkins_home: /var/lib/jenkins
  tasks:
    - name: Update system packages
      yum:
        name: '*'
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Update system packages (Debian)
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Install Java
      package:
        name: java-11-openjdk-devel
        state: present

    - name: Add Jenkins repository
      shell: |
        wget -q -O - https://pkg.jenkins.io/debian/jenkins.io.key | apt-key add -
        sh -c 'echo deb https://pkg.jenkins.io/debian-stable binary/ > /etc/apt/sources.list.d/jenkins.list'
      when: ansible_os_family == "Debian"

    - name: Install Jenkins (Debian)
      apt:
        name: jenkins
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install Jenkins (RedHat)
      shell: |
        wget -q -O - https://pkg.jenkins.io/redhat-stable/jenkins.io.key | rpm --import -
        yum install -y jenkins
      when: ansible_os_family == "RedHat"

    - name: Start and enable Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Wait for Jenkins to start
      wait_for:
        port: "{{ jenkins_port }}"
        delay: 10

    - name: Get Jenkins admin password
      command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_admin_password
      changed_when: false

    - name: Display Jenkins admin password
      debug:
        msg: "Jenkins initial admin password: {{ jenkins_admin_password.stdout }}"

    - name: Install Jenkins plugins
      jenkins_plugin:
        name: "{{ item }}"
        url_username: admin
        url_password: "{{ jenkins_admin_password.stdout }}"
        url: "http://localhost:{{ jenkins_port }}"
        state: present
      loop:
        - github
        - pipeline
        - docker-plugin
        - kubernetes
        - credentials
        - git
        - aws
      ignore_errors: yes

    - name: Create Jenkins credentials for AWS
      copy:
        content: |
          jenkins_aws_access_key_id: "{{ aws_access_key_id }}"
          jenkins_aws_secret_access_key: "{{ aws_secret_access_key }}"
        dest: "{{ jenkins_home }}/aws_credentials.yaml"
        mode: '0600'

    - name: Open firewall for Jenkins
      firewalld:
        port: "{{ jenkins_port }}/tcp"
        permanent: yes
        state: enabled
      when: ansible_os_family == "RedHat"
      notify: reload firewall

  handlers:
    - name: reload firewall
      systemd:
        name: firewalld
        state: reloaded
