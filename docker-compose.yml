version: '3.9'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-todolist_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build: .
    command: >
      sh -c "
      sleep 10 &&
      python manage.py migrate --no-input ||  true &&
      python manage.py collectstatic --noinput ||  true &&
      gunicorn todolist.wsgi:application --bind 0.0.0.0:8000"
    environment:
      - USE_SQLITE=0
      - POSTGRES_DB=todolist_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_SSL=0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  celery:
    build: .
    command: python -m celery -A todolist worker -l info
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: python -m celery -A todolist beat -l info
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
