apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolist-app
  namespace: todolist
  labels:
    app: todolist-app
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: todolist-app
  template:
    metadata:
      labels:
        app: todolist-app
        version: v1
    spec:
      serviceAccountName: todolist-app
      initContainers:
      - name: db-migrate
        image: your-account-id.dkr.ecr.us-east-1.amazonaws.com/share-task-repo:latest
        command: ["python", "todolist/manage.py", "migrate"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        env:
        - name: DATABASE_HOST
          value: postgres-service
      - name: static-collect
        image: your-account-id.dkr.ecr.us-east-1.amazonaws.com/share-task-repo:latest
        command: ["python", "todolist/manage.py", "collectstatic", "--noinput"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        env:
        - name: DATABASE_HOST
          value: postgres-service
        volumeMounts:
        - name: static-files
          mountPath: /app/todolist/staticfiles
      containers:
      - name: todolist
        image: your-account-id.dkr.ecr.us-east-1.amazonaws.com/share-task-repo:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        env:
        - name: DATABASE_HOST
          value: postgres-service
        - name: REDIS_URL
          value: redis://redis-service:6379/0
        livenessProbe:
          httpGet:
            path: /health/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
        volumeMounts:
        - name: static-files
          mountPath: /app/todolist/staticfiles
        - name: media-files
          mountPath: /app/todolist/media
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
      volumes:
      - name: static-files
        emptyDir: {}
      - name: media-files
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - todolist-app
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: todolist-service
  namespace: todolist
  labels:
    app: todolist-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: todolist-app
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: todolist-hpa
  namespace: todolist
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todolist-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: todolist-pdb
  namespace: todolist
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: todolist-app
