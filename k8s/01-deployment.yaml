apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolist-app
  namespace: todolist
  labels:
    app: todolist-app
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: todolist-app
  template:
    metadata:
      labels:
        app: todolist-app
        version: v1
    spec:
      serviceAccountName: todolist-app

      initContainers:
      - name: db-migrate
        image: share-task-web:latest
        imagePullPolicy: Never
        command: ["python", "manage.py", "migrate"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        env:
        - name: DATABASE_HOST
          value: postgres-service

      - name: static-collect
        image: share-task-web:latest
        imagePullPolicy: Never
        command: ["python", "manage.py", "collectstatic", "--noinput"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        env:
        - name: DATABASE_HOST
          value: postgres-service
        volumeMounts:
        - name: static-files
          mountPath: /app/staticfiles

      containers:
      - name: todolist
        image: share-task-web:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8000
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        env:
        - name: DATABASE_HOST
          value: postgres-service
        - name: REDIS_URL
          value: redis://redis-service:6379/0

        livenessProbe:
          httpGet:
            path: /health/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health/
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"

        volumeMounts:
        - name: static-files
          mountPath: /app/staticfiles
        - name: media-files
          mountPath: /app/media

      volumes:
      - name: static-files
        emptyDir: {}
      - name: media-files
        emptyDir: {}
