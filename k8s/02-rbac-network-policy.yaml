apiVersion: v1
kind: ServiceAccount
metadata:
  name: todolist-app
  namespace: todolist
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todolist-app
  namespace: todolist
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todolist-app
  namespace: todolist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: todolist-app
subjects:
- kind: ServiceAccount
  name: todolist-app
  namespace: todolist
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: todolist-network-policy
  namespace: todolist
spec:
  podSelector:
    matchLabels:
      app: todolist-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: nginx-ingress
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
