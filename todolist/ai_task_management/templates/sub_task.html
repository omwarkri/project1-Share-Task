<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subtasks</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e6e9ef);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .custom-subtask-container {
      max-width: 600px;
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    .custom-subtask-heading {
      color: #34495e;
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .custom-subtask-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    .custom-subtask-item {
      background: #ffffff;
      margin-bottom: 12px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .custom-subtask-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .custom-completed .custom-subtask-text {
      text-decoration: line-through;
      color: #95a5a6;
    }

    .custom-toggle-button {
      background: none;
      border: 2px solid #1abc9c;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .custom-toggle-button.custom-completed {
      background: #1abc9c;
      border-color: #1abc9c;
    }

    .custom-toggle-button.custom-completed::before {
      content: "✔";
      color: white;
      font-size: 14px;
    }

    .custom-toggle-button.loading::before {
      content: "";
      width: 16px;
      height: 16px;
      border: 2px solid #1abc9c;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .custom-subtask-text {
      flex: 1;
      margin: 0 10px;
      font-size: 16px;
      color: #333;
    }

    .subtask-actions button {
      background: none;
      border: none;
      color: #3498db;
      cursor: pointer;
      font-size: 14px;
      margin-left: 5px;
    }

    .subtask-actions button:hover {
      text-decoration: underline;
    }

    .custom-subtask-form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .custom-subtask-form input {
      flex: 1 1 auto;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .custom-subtask-form input:focus {
      border-color: #1abc9c;
      box-shadow: 0 0 8px rgba(26, 188, 156, 0.3);
    }

    .custom-subtask-form button {
      background: linear-gradient(135deg, #1abc9c, #16a085);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      flex: 0 0 auto;
    }

    .custom-subtask-form button.loading {
      background: linear-gradient(135deg, #16a085, #1abc9c);
      cursor: not-allowed;
    }

    .custom-empty-state {
      text-align: center;
      color: #95a5a6;
      font-size: 16px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .custom-subtask-container {
        padding: 20px;
      }

      .custom-subtask-form {
        flex-direction: column;
      }

      .custom-subtask-form button,
      .custom-subtask-form input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="custom-subtask-container">
    <h3 class="custom-subtask-heading">Subtasks</h3>

    <ul class="custom-subtask-list" id="subtask-list"></ul>
    <p id="empty-message" class="custom-empty-state" style="display: none;">No subtasks yet.</p>

    <div class="custom-subtask-form">
      <input type="text" id="new-subtask" placeholder="Add a new subtask">
      <button id="add-button" onclick="addSubtask()">Add</button>
      <button id="suggest-button" onclick="suggestSubtasks()">AI Suggestions</button>
    </div>

    <input type="hidden" id="csrf-token" value="{{ csrf_token }}">
  </div>

  <script>
    const taskId = {{ task.id }};
    const csrfToken = document.getElementById("csrf-token").value;

    async function fetchSubtasks() {
      const response = await fetch(`/api/tasks/${taskId}/subtasks/`);
      const subtasks = await response.json();
      const subtaskList = document.getElementById("subtask-list");
      subtaskList.innerHTML = "";

      if (subtasks.length === 0) {
        document.getElementById("empty-message").style.display = "block";
      } else {
        document.getElementById("empty-message").style.display = "none";
        subtasks.forEach(subtask => {
          const li = document.createElement("li");
          li.className = `custom-subtask-item ${subtask.completed ? "custom-completed" : ""}`;
          li.innerHTML = `
            <div class="custom-toggle-button ${subtask.completed ? "custom-completed" : ""}" onclick="toggleSubtask(${subtask.id})"></div>
            <p class="custom-subtask-text" id="text-${subtask.id}">${subtask.title}</p>
            <div class="subtask-actions">
              <button onclick="editSubtask(${subtask.id}, '${subtask.title.replace(/'/g, "\\'")}')">Edit</button>
              <button onclick="deleteSubtask(${subtask.id})">Delete</button>
            </div>
          `;
          subtaskList.appendChild(li);
        });
      }
    }

    async function addSubtask() {
      const addButton = document.getElementById("add-button");
      const title = document.getElementById("new-subtask").value.trim();
      if (!title) return alert("Subtask title is required!");

      addButton.textContent = "Adding...";
      addButton.classList.add("loading");

      const response = await fetch(`/api/tasks/${taskId}/subtasks/add/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({ title })
      });

      if (response.ok) {
        document.getElementById("new-subtask").value = "";
        fetchSubtasks();
      } else {
        alert("Error adding subtask!");
      }

      addButton.textContent = "Add";
      addButton.classList.remove("loading");
    }

    async function toggleSubtask(subtaskId) {
      const button = document.querySelector(`.custom-toggle-button[onclick="toggleSubtask(${subtaskId})"]`);
      button.classList.add("loading");

      const response = await fetch(`/api/subtasks/${subtaskId}/toggle/`, {
        method: "POST",
        headers: { "X-CSRFToken": csrfToken }
      });

      if (response.ok) {
        fetchSubtasks();
      } else {
        alert("Error toggling subtask!");
      }

      button.classList.remove("loading");
    }

    async function deleteSubtask(subtaskId) {
      const confirmed = confirm("Are you sure you want to delete this subtask?");
      if (!confirmed) return;

      const response = await fetch(`/api/subtasks/${subtaskId}/delete/`, {
        method: "DELETE",
        headers: { "X-CSRFToken": csrfToken }
      });

      if (response.ok) {
        fetchSubtasks();
      } else {
        alert("Error deleting subtask!");
      }
    }

    function editSubtask(id, currentTitle) {
      const textEl = document.getElementById(`text-${id}`);
      const newTitle = prompt("Edit subtask title:", currentTitle);
      if (newTitle && newTitle.trim() !== "" && newTitle !== currentTitle) {
        updateSubtask(id, newTitle);
      }
    }

    async function updateSubtask(id, title) {
      const response = await fetch(`/api/subtasks/${id}/update/`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({ title })
      });

      if (response.ok) {
        fetchSubtasks();
      } else {
        alert("Error updating subtask!");
      }
    }

    async function suggestSubtasks() {
      const suggestButton = document.getElementById("suggest-button");
      suggestButton.textContent = "Suggesting...";
      suggestButton.classList.add("loading");

      try {
        const response = await fetch(`/api/tasks/${taskId}/subtasks/ai_suggestions/`, {
          method: "GET",
          headers: { "X-CSRFToken": csrfToken }
        });

        const suggestions = await response.json();
        for (let suggestion of suggestions) {
          await fetch(`/api/tasks/${taskId}/subtasks/add/`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken
            },
            body: JSON.stringify({ title: suggestion })
          });
        }
        fetchSubtasks();
      } catch (err) {
        alert("Failed to fetch suggestions.");
      }

      suggestButton.textContent = "AI Suggestions";
      suggestButton.classList.remove("loading");
    }

    fetchSubtasks();
  </script>
</body>
</html>
