<!-- templates/subscription/subscribe.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe</title>
    <style>
        /* CSS Variables for Consistent Styling */
        :root {
            --primary-color: #0070ba; /* Blue */
            --secondary-color: #4CAF50; /* Green */
            --background-color: #f8f9fa; /* Light Gray */
            --text-color: #333; /* Dark Gray */
            --border-color: #e0e0e0; /* Light Gray */
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --radius: 8px;
            --transition: all 0.3s ease;
        }
    
        /* General Styles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    
        .container {
            width: 100%;
            max-width: 600px;
            margin: 20px;
            padding: 30px;
            background-color: white;
            box-shadow: var(--shadow);
            border-radius: var(--radius);
        }
    
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }
    
        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 8px;
            display: block;
        }
    
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-sizing: border-box;
            font-size: 14px;
            transition: var(--transition);
        }
    
        input[type="email"],
        input[type="text"] {
            background-color: #f9f9f9;
        }
    
        input:focus,
        select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 112, 186, 0.1);
        }
    
        button {
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            transition: var(--transition);
        }
    
        button:hover {
            background-color: #005f8d;
        }
    
        .form-group {
            margin-bottom: 20px;
        }
    
        .form-group:last-child {
            margin-bottom: 0;
        }
    
        .hidden {
            display: none;
        }
    
        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 90%;
                padding: 20px;
            }
    
            h1 {
                font-size: 22px;
            }
    
            input, select {
                padding: 10px;
            }
    
            button {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Subscribe Now</h1>
        <form method="POST" id="paypal-form">
            {% csrf_token %}
            
            <!-- User's Email -->
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <!-- Payment Details -->
            <div class="form-group">
                <label for="card-type">Card Type:</label>
                <select name="card-type" id="card-type">
                    <option value="visa">Visa</option>
                    <option value="mastercard">Mastercard</option>
                    <option value="american-express">American Express</option>
                    <!-- Add other options as needed -->
                </select>
            </div>

            <div class="form-group">
                <label for="card-number">Card Number:</label>
                <input type="text" name="card-number" id="card-number" required>
            </div>

            <div class="form-group">
                <label for="expire-month">Expiration Month:</label>
                <input type="text" name="expire-month" id="expire-month" required>
            </div>

            <div class="form-group">
                <label for="expire-year">Expiration Year:</label>
                <input type="text" name="expire-year" id="expire-year" required>
            </div>

            <div class="form-group">
                <label for="cvv">CVV:</label>
                <input type="text" name="cvv" id="cvv" required>
            </div>

            <!-- Shipping Address -->
            <div class="form-group">
                <label for="address-line1">Address Line 1:</label>
                <input type="text" name="address-line1" id="address-line1" required>
            </div>

            <div class="form-group">
                <label for="city">City:</label>
                <input type="text" name="city" id="city" required>
            </div>

            <div class="form-group">
                <label for="state">State:</label>
                <input type="text" name="state" id="state" required>
            </div>

            <div class="form-group">
                <label for="postal-code">Postal Code:</label>
                <input type="text" name="postal-code" id="postal-code" required>
            </div>

            <div class="form-group">
                <label for="country">Country:</label>
                <input type="text" name="country" id="country" required>
            </div>

            <!-- Subscription Plan ID (you can hide this in case of a single plan or let the user select) -->
            <input type="hidden" name="plan-id" value="P-2PL786081D358645F6NWEKFQ">

            <button type="submit">Subscribe Now</button>
        </form>

        <div class="form-footer">
            <p>By subscribing, you agree to our terms and conditions.</p>
        </div>
    </div>


    

</body>
</html>
