<!-- templates/emails/daily_suggested_tasks.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Daily Suggested Tasks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .email-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .email-header {
            text-align: center;
            padding: 20px;
            background-color: #18473f;
            color: #ffffff;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .email-header h2 {
            margin: 0;
            font-size: 24px;
        }
        .email-body {
            padding: 20px;
        }
        .email-body p {
            font-size: 16px;
            color: #333333;
            margin: 10px 0;
        }
        .email-body ul {
            padding-left: 20px;
            list-style-type: none;
        }
        .email-body ul li {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555555;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #dddddd;
            border-radius: 5px;
        }
        .email-footer {
            text-align: center;
            padding: 20px;
            background-color: #f4f4f4;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            font-size: 14px;
            color: #777777;
        }
        .email-footer p {
            margin: 5px 0;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 0;
            background-color: #1abc9c;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="email-header">
            <h2>✨ Your AI-Suggested Tasks for Today</h2>
        </div>

        <!-- Body -->
        <div class="email-body">
            <p>Hello <strong>{{ user.username }}</strong>,</p>
            <p>Here are your <strong>AI-suggested tasks</strong> for today:</p>
            <ul>
                {% for task in suggested_tasks %}
                <li>{{ task }}</li>
                {% endfor %}
            </ul>
            <p>Stay productive! 🚀</p>
            <p><a href="{{ home_page_link }}" class="btn">Go to Home Page</a></p>
        </div>

        <!-- Footer -->
        <div class="email-footer">
            <p>This is an automated message. Please do not reply.</p>
        </div>
    </div>
</body>
</html>
