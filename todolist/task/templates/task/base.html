    <style>
        /* General Styles */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        body.base-main-body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Inter', 'Poppins', 'Nunito', sans-serif;

            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        /* Header Styles */
        header {
            background-color: #ffffff;
            color: #333;
            width: 100%;
            
            position: fixed;
            top: 0;
            z-index: 1000;
         
            padding: 4px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
     
            transition: transform 0.3s ease-in-out; /* Smooth transition for hiding/showing */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-right{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-div {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-site-logo {
            height: 35px;
            width: 30px;
        }

        .view-chats-button {
            padding: 8px 12px;
            background-color: #f8f9fa;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .view-chats-button:hover {
            background-color: #e9ecef;
        }

        .welcome-message a {
            text-decoration: none;
            color: #1abc9c;
        }

        /* Pomodoro Button Styles */
.pomodoro-button {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #555;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.3s ease;
}

.pomodoro-button:hover {
    background-color: #f0f0f0;
    color: #1abc9c;
}

/* Pomodoro Modal Styles */
.pomodoro-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    justify-content: center;
    align-items: center;
    z-index: 5000;
    
}

.pomodoro-content {
    background-color: #fff;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    position: relative;
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.pomodoro-display {
    font-size: 3.5rem;
    font-weight: bold;
    margin: 20px 0;
    text-align: center;
    font-family: monospace;
}

.pomodoro-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.pomodoro-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}

.pomodoro-btn-start {
    background-color: #1abc9c;
    color: white;
}

.pomodoro-btn-pause {
    background-color: #f39c12;
    color: white;
}

.pomodoro-btn-reset {
    background-color: #e74c3c;
    color: white;
}

.pomodoro-btn:hover {
    opacity: 0.9;
}

.pomodoro-settings {
    margin-top: 20px;
}

.pomodoro-settings div {
    margin-bottom: 10px;
}

.pomodoro-settings label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.pomodoro-settings input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
}

.pomodoro-status {
    text-align: center;
    font-style: italic;
    color: #666;
    margin-top: 10px;
}

/* Schedule Button Styles */
.schedule-button {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #555;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.3s ease;
}

.schedule-button:hover {
    background-color: #f0f0f0;
    color: #1abc9c;
}

/* Schedule Modal Styles */
.schedule-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    justify-content: center;
    align-items: center;
    z-index: 5000;
}

.schedule-content {
    background-color: #fff;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    position: relative;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.schedule-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
}

.schedule-title {
    font-size: 1.5rem;
    color: #333;
}

.schedule-list {
    list-style: none;
}

.schedule-item {
    padding: 15px;
    margin-bottom: 10px;
    background-color: rgba(255, 255, 255, 0.7);
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
}

.schedule-item-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
}

.schedule-item-time {
    font-weight: bold;
    color: #1abc9c;
}

.schedule-item-title {
    font-weight: bold;
    margin-bottom: 5px;
}

.schedule-item-description {
    color: #666;
    font-size: 0.9rem;
}

.schedule-loading {
    text-align: center;
    padding: 20px;
    color: #666;
}

.schedule-error {
    text-align: center;
    padding: 20px;
    color: #e74c3c;
}
/* Schedule Content Styles */
.schedule-paragraph {
    white-space: pre-wrap;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    padding: 15px;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 8px;
    margin-bottom: 15px;
}

.schedule-section {
    margin-bottom: 20px;
}

.schedule-section-title {
    font-weight: bold;
    color: #1abc9c;
    margin-bottom: 10px;
    font-size: 1.1rem;
}

.schedule-item {
    margin-bottom: 8px;
    position: relative;
    padding-left: 20px;
}

.schedule-item:before {
    content: "•";
    position: absolute;
    left: 0;
    color: #1abc9c;
}

.schedule-time {
    font-weight: bold;
    color: #3498db;
}

.schedule-priority {
    font-style: italic;
    color: #e74c3c;
    font-size: 0.9rem;
}

.schedule-note {
    font-style: italic;
    color: #666;
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px dashed #ddd;
}


        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease-in-out;
            z-index: 1000;

            justify-content: space-between;
            background-color: #ffffff;
            transform: translateX(-100%); /* Hidden by default on mobile */
        }

        .sidebar.show {
            transform: translateX(0); /* Show sidebar when toggled */
        }

            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .sidebar-toggle {

            padding: 8px;

            border-radius: 5px;

        }

        }

        }

        .sidebar-menu a.active ,.sidebar-menu button:active{

            color: white;
        }

        .sidebar-footer {
            margin-top: 30px;
        }
        

        

        .accountbutton {

        /* Main Content */
        main {

            max-width: 1600px;

/* Modal Styles */
    /* Modal Styles */
    .modal {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    justify-content: center;
    align-items: center;
    z-index: 5000; /* Ensure it's on top */
}


.modal-content {
    background-color: #fff;
    border-radius: 12px;
    width: 90%; /* Fallback for smaller screens */
    max-width: 800px; /* Maximum width */
    min-width: 500px; /* Minimum width */
    height: auto; /* Flexible height */
    max-height: 80vh; /* Maximum height */
    min-height: 60vh; /* Minimum height */
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    position: relative;
    animation: modalFadeIn 0.3s ease;
    overflow-y: auto; /* Enable scrolling if content overflows */
    margin: 20px; /* Add some spacing from viewport edges */
    display: flex;
    flex-direction: column;
}
.close-btn {
    color: #aaa;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
    margin-left: auto; /* Pushes it to the right */
}

.close-btn:hover,
.close-btn:focus {
    color: black;
    text-decoration: none;
}

/* For larger screens - fixed dimensions */
@media (min-width: 992px) {
    .modal-content {
        width: 800px; /* Fixed width */
        height: 600px; /* Fixed height */
    }
}

/* Modal Header */
.modal-header {
    padding: 20px;
    border-bottom: 1px solid #e9ecef;
    position: relative;
    top: 0;
    background: white;
    z-index: 1;
    position: relative;
    display: flex;
    width: 100%;
    justify-content: space-between;
    

}

.close-modal{
    position: absolute;
    right: 10;

}

/* Modal Body - flexible content area */
.modal-body {
    padding: 20px;
    color: #555;
    flex: 1; /* Takes remaining space */
    overflow-y: auto; /* Scrollable content */
}

/* Modal Footer */
.modal-footer {
    padding: 20px;
    border-top: 1px solid #e9ecef;
    position: sticky;
    bottom: 0;
    background: white;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

/* Animation for Modal */
@keyframes modalFadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("show");
    }

       


        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const allTasksLink = document.getElementById('all-tasks-link');
            const leaderboardLink = document.getElementById('leaderboard-link');

            allTasksLink.classList.remove('active');
            leaderboardLink.classList.remove('active');

            if (currentPath === "{% url 'home' %}") {
                allTasksLink.classList.add('active');
            } else if (currentPath === "{% url 'leaderboard' %}") {
                leaderboardLink.classList.add('active');
            }
        });

   
    let lastScrollTop = 0; // Variable to store the last scroll position

    window.addEventListener("scroll", function () {
        const header = document.querySelector("header");
        const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop;

        console.log("Current Scroll:", currentScrollTop, "Last Scroll:", lastScrollTop); // Debugging

        if (currentScrollTop > lastScrollTop) {
            // User is scrolling down
            console.log("Scrolling down - Hiding header"); // Debugging
            header.classList.add("hide-header");
        } else {
            // User is scrolling up
            console.log("Scrolling up - Showing header"); // Debugging
            header.classList.remove("hide-header");
        }

        lastScrollTop = currentScrollTop <= 0 ? 0 : currentScrollTop; // Update last scroll position
    });



        // Optional: Show spinner during AJAX requests
        function fetchData(url) {
            showLoadingSpinner();
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    // Process the data
                    hideLoadingSpinner();
                })
                .catch(error => {
                    console.error('Error:', error);
                    hideLoadingSpinner();
                });
        }






    </script>
