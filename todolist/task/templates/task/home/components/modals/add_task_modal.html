<div id="addTaskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close-modal" onclick="AddTaskcloseModal()">&times;</span>
            <h2>Add Task</h2>
        </div>
        <div class="modal-body">
            <form method="POST" action="{% url 'add_task' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="submit-btn btn btn-primary">Add Task</button>
            </form>
        </div>
    </div>
</div>
