                    <polyline points="14 2 14 8 20 8"></polyline>

<script>
// Global variable to store current task
let currentTask = null;

async function renderActiveTaskModal(task) {
    currentTask = task;
    const detailTaskContent = document.getElementById('detailTaskContent');
    const modal = document.getElementById('detailTaskModal');

    // Show modal immediately with loader
    modal.style.display = 'flex';
    detailTaskContent.innerHTML = '<div class="loader"></div>';
    
    try {
        // Simulate loading (remove in production)
        await new Promise(resolve => setTimeout(resolve, 300));
        
        let subtasksHtml = '';
        
        if (task.subtasks && task.subtasks.length > 0) {
            // Find the first incomplete subtask
            const firstIncompleteIndex = task.subtasks.findIndex(
                subtask => !subtask.is_completed
            );
            
            subtasksHtml = `
                <div class="subtasks-container">
                    <h5>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        Subtasks / Microtasks
                    </h5>
                    <ul class="subtasks-list">
                        ${task.subtasks.map((subtask, index) => {
                            // Determine if microtasks should be locked
                            const shouldLockMicrotasks = firstIncompleteIndex >= 0 && 
                                                       index > firstIncompleteIndex;
                            
                            return `
                                <li class="subtask-item ${subtask.is_completed ? 'completed' : ''}">
                                    <label>
                                        <input type="checkbox" 
                                               ${subtask.is_completed ? 'checked' : ''}
                                               onchange="toggleSubtaskCompletion(${subtask.id}, this, ${task.id})">
                                        <span>${subtask.title}</span>
                                    </label>
                                    <ul class="microtasks-list">
                                        ${
                                            (subtask.microtasks && subtask.microtasks.length > 0)
                                            ? subtask.microtasks.map(microtask => `
                                                <li class="microtask-item ${microtask.is_completed ? 'completed' : ''} 
                                                    ${shouldLockMicrotasks ? 'locked' : ''}">
                                                    <label>
                                                        <input type="checkbox"
                                                               ${microtask.is_completed ? 'checked' : ''}
                                                               ${shouldLockMicrotasks ? 'disabled' : ''}
                                                               onchange="toggleMicrotaskCompletion(${microtask.id}, this, ${subtask.id}, ${task.id})"
                                                               onclick="event.stopPropagation();">
                                                        <span class="microtask-title">
                                                            ${microtask.title}
                                                        </span>
                                                        ${shouldLockMicrotasks ? 
                                                            `<svg class="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                                            </svg>` : ''}
                                                    </label>
                                                </li>
                                            `).join('')
                                            : `
                                                <li class="no-microtasks">
                                                    <p>No microtasks yet</p>
                                                    ${!shouldLockMicrotasks ? 
                                                        `<button class="task-action" onclick="generateAIMicrotasks(${task.id}, ${subtask.id})">
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                                <circle cx="12" cy="12" r="10"></circle>
                                                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                                            </svg>
                                                            Generate Microtasks
                                                        </button>` : 
                                                        `<div style="color: #888; font-size: 12px; margin-top: 5px;">
                                                            Complete previous subtasks first
                                                        </div>`
                                                    }
                                                </li>
                                            `
                                        }
                                    </ul>
                                </li>
                            `;
                        }).join('')}
                    </ul>
                </div>
            `;
        } else {
            subtasksHtml = `
                <div class="no-subtasks">
                    <p>No subtasks yet</p>
                    <button class="task-action" onclick="generateAISubtasks(${task.id})">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        Generate AI Subtasks
                    </button>
                </div>
            `;
        }

        // Render the actual content
        detailTaskContent.innerHTML = `
            <div class="active-task-header">
                <h4>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v4l3 3"></path>
                    </svg>
                    Task Details
                </h4>
            </div>
            <div class="active-task-content">
                <h3>${task.title}</h3>
                <p>${task.description || 'No description provided.'}</p>
                <div class="task-meta">
                    <span class="priority-badge priority-${task.priority.toLowerCase()}">
                        Priority: ${task.priority}
                    </span>
                    <span class="due-date">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Due: ${new Date(task.due_date).toLocaleDateString()}
                    </span>
                </div>
                ${subtasksHtml}
                <input type="hidden" id="activeTaskId" value="${task.id}">
            </div>
        `;
        
    } catch (error) {
        console.error("Error rendering task modal:", error);
        detailTaskContent.innerHTML = `
            <div class="error-message">
                <p>⚠️ Failed to load task details</p>
                <button class="task-action" onclick="renderActiveTaskModal(currentTask)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"></path>
                    </svg>
                    Retry
                </button>
            </div>
        `;
    }
}

async function toggleSubtaskCompletion(subtaskId, checkbox, taskId) {
    try {
        // Show loading state
        checkbox.disabled = true;
        
        // Call your API to update subtask completion status
        const response = await fetch(`/api/subtasks/${subtaskId}/toggle/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
            },
            body: JSON.stringify({
                is_completed: checkbox.checked
            })
        });
        
        if (response.ok) {
            // Refresh the modal to update the locked state of microtasks
            const task = await fetchTaskDetails(taskId);
            renderActiveTaskModal(task);
        } else {
            checkbox.checked = !checkbox.checked; // Revert if failed
            checkbox.disabled = false;
        }
    } catch (error) {
        console.error("Error toggling subtask:", error);
        checkbox.checked = !checkbox.checked; // Revert on error
        checkbox.disabled = false;
    }
}

async function toggleMicrotaskCompletion(microtaskId, checkbox, subtaskId, taskId) {
    try {
        // Show loading state
        checkbox.disabled = true;
        
        // Call your API to update microtask completion status
        const response = await fetch(`/api/microtasks/${microtaskId}/toggle/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
            },
            body: JSON.stringify({
                is_completed: checkbox.checked
            })
        });
        
        if (response.ok) {
            // Refresh the modal to update the state
            const task = await fetchTaskDetails(taskId);
            renderActiveTaskModal(task);
        } else {
            checkbox.checked = !checkbox.checked; // Revert if failed
            checkbox.disabled = false;
        }
    } catch (error) {
        console.error("Error toggling microtask:", error);
        checkbox.checked = !checkbox.checked; // Revert on error
        checkbox.disabled = false;
    }
}

function closeDetailTaskModal() {
    document.getElementById('detailTaskModal').style.display = 'none';
}

// Helper function to get CSRF token
function getCSRFToken() {
    const cookieValue = document.cookie
        .split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
    return cookieValue || '';
}

// You'll need to implement these functions according to your backend API
async function fetchTaskDetails(taskId) {
    // Implement this to fetch task details from your backend
    const response = await fetch(`/api/tasks/${taskId}/`);
    return await response.json();
}

async function completeActiveTask() {
    const taskId = document.getElementById('activeTaskId').value;
    // Implement this to mark task as complete
    await fetch(`/api/tasks/${taskId}/complete/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCSRFToken(),
        }
    });
    closeDetailTaskModal();
    // Refresh your task list here
}

function viewTaskDetails() {
    const taskId = document.getElementById('activeTaskId').value;
