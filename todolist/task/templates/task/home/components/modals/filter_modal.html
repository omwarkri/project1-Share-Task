<!-- Filter Modal -->
<div id="filterModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeFilterModal()">&times;</span>
        <h3>⚙️ Filters</h3>

        <!-- Tabs for Filters -->
        <div class="filter-tabs">
            <button class="tab-button active" onclick="openFilterTab('status')">📊 Status</button>
            <button class="tab-button" onclick="openFilterTab('priority')">🚦 Priority</button>
            <button class="tab-button" onclick="openFilterTab('sort')">🔀 Sort By</button>
        </div>

        <!-- Status Filters -->
        <div id="status-filters" class="filter-tab-content active">
            <h4>Filter by Status:</h4>
            <div class="filter-buttons">
                <button onclick="filterTasks('all', 'all')" class="modern-button">🌐 All</button>
                <button onclick="filterTasks('pending', 'all')" class="modern-button">⏳ Pending</button>
                <button onclick="filterTasks('in_progress', 'all')" class="modern-button">🚧 In Progress</button>
                <button onclick="filterTasks('completed', 'all')" class="modern-button">✅ Completed</button>
                <button onclick="filterTasks('archived', 'all')" class="modern-button">🗄️ Archived</button>
            </div>
        </div>

        <!-- Priority Filters -->
        <div id="priority-filters" class="filter-tab-content">
            <h4>Filter by Priority:</h4>
            <div class="filter-buttons">
                <button onclick="filterTasks('all', 'all')" class="modern-button">🌐 All</button>
                <button onclick="filterTasks('all', 'low')" class="modern-button">✅ Low</button>
                <button onclick="filterTasks('all', 'medium')" class="modern-button">⚠️ Medium</button>
                <button onclick="filterTasks('all', 'high')" class="modern-button">🚨 High</button>
                <button onclick="filterTasks('all', 'critical')" class="modern-button">🔥 Critical</button>
            </div>
        </div>

        <!-- Sort Filters -->
        <div id="sort-filters" class="filter-tab-content">
            <h4>Sort By:</h4>
            <div class="filter-options">
                <select id="sort-by" class="modern-select" onchange="applySorting()">
                    <option value="title">📝 Title</option>
                    <option value="due_date">📅 Due Date</option>
                    <option value="priority">🚦 Priority</option>
                    <option value="status">📊 Status</option>
                </select>
                <select id="sort-order" class="modern-select" onchange="applySorting()">
                    <option value="asc">⬆️ Ascending</option>
                    <option value="desc">⬇️ Descending</option>
                </select>
            </div>
        </div>

        <!-- Apply Filters Button -->
        <button class="apply-filters-button" onclick="applyFilters()">Apply Filters</button>
    </div>
</div>
