<!-- templates/task/sidebar.html -->
<div class="team-sidebar" data-team-id="{{team.id }}">
    <div class="team-sidebar-header">
        <h2>📋</h2> <!-- Main symbol for the app -->
    </div>
    <ul class="team-sidebar-links">
        <li>
            <a href="{% url 'view_team_tasks' team.id %}" title="All Teams">
                🏠 <!-- Home symbol for all teams -->
            </a>
        </li>
        <li>
            <a href="#" onclick="openAddTaskModal()" title="Create Task">
                ➕ <!-- Add symbol for creating a task -->
            </a>
        </li>
        <li>
            <a href="{% url 'team_leaderboard' team.id %}" title="Leaderboard">
                🏆<!-- Leaderboard symbol -->
            </a>
        </li>
        <li>
            <a href="#" onclick="openTeamMembersModal()" title="Team Members">
                👥 <!-- Team symbol -->
            </a>
        </li>
    </ul>
</div>

<!-- Add Task Modal -->
<div id="taskModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add Task</h3>
            <span class="close" onclick="closeAddTaskModal()">&times;</span>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ task_form.as_p }}
            <button type="submit" name="add_task">Create Task</button>
        </form>
    </div>
</div>

<!-- Team Members Modal -->
<div id="teamMembersModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeTeamMembersModal()">&times;</span>
        <h3>👥 Team Members</h3>
        <div class="team-members-list">
            <ul>
                {% for member in team.members.all %}
                    <li>
                        <a href="#" class="member-link" data-member-id="{{ member.id }}">{{ member.username }}</a>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>

<!-- Member Analysis Modal -->
<div id="memberAnalysisModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeMemberAnalysisModal()">&times;</span>
        <h3 id="memberAnalysisTitle">👤 Member Analysis</h3>
        <div id="memberAnalysisContent">
            <!-- Analysis data will be loaded here dynamically -->
            <p>Loading analysis...</p>
        </div>
    </div>
</div>

<style>
    .team-sidebar {
        width: 80px; /* Narrow sidebar for icons */
        background-color: #e4fff9; /* Light background */
        padding: 10px;
        border-right: 1px solid #ccffeea1;
        height: 100vh; /* Full height */
        position: fixed; /* Fixed position */
        left: 0;
        top: 0;
        overflow-y: auto; /* Scrollable if content overflows */
    }

    .team-sidebar-header {
        text-align: center;
        margin-bottom: 20px;
    }

    .team-sidebar-header h2 {
        color: #333; /* Dark text for the header */
        font-size: 24px;
    }

    .team-sidebar-links {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    .team-sidebar-links li {
        margin-bottom: 20px;
        text-align: center;
    }

    .team-sidebar-links li a {
        color: #333; /* Dark text for links */
        text-decoration: none;
        font-size: 24px;
        display: block;
        transition: transform 0.2s ease, color 0.2s ease;
    }

    .team-sidebar-links li a:hover {
        transform: scale(1.2); /* Slightly enlarge on hover */
        color: #16a085; /* Teal color for hover */
    }

    .team-sidebar-links li a[title]:hover::after {
        content: attr(title);
        position: absolute;
        background-color: #333;
        color: #fff;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 14px;
        margin-left: 10px;
        white-space: nowrap;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .modal-header h3 {
        margin: 0;
    }

    .close, .close-modal {
        cursor: pointer;
        font-size: 24px;
        color: #666;
    }

    .close:hover, .close-modal:hover {
        color: #333;
    }

    .team-members-list {
        margin-top: 20px;
    }

    .team-members-list ul {
        list-style-type: none;
        padding: 0;
    }

    .team-members-list li {
        padding: 10px;
        margin-bottom: 10px;
        background-color: #f9f9f9;
        border-radius: 8px;
        transition: background-color 0.3s ease;
    }

    .team-members-list li:hover {
        background-color: #f0f0f0;
    }
</style>

<script>
    const teamSidebar = document.querySelector('.team-sidebar');
    const teamId = teamSidebar.getAttribute('data-team-id');
    console.log(teamId);
    function openAddTaskModal() {
        const taskModal = document.getElementById('taskModal');
        taskModal.style.display = 'flex';
    }

    function closeAddTaskModal() {
        const taskModal = document.getElementById('taskModal');
        taskModal.style.display = 'none';
    }

    function openTeamMembersModal() {
        const teamMembersModal = document.getElementById('teamMembersModal');
        teamMembersModal.style.display = 'flex';
    }

    function closeTeamMembersModal() {
        const teamMembersModal = document.getElementById('teamMembersModal');
        teamMembersModal.style.display = 'none';
    }

    // Close modals when clicking outside the modal
    window.addEventListener('click', (event) => {
        const taskModal = document.getElementById('taskModal');
        const teamMembersModal = document.getElementById('teamMembersModal');

        if (event.target === taskModal) {
            taskModal.style.display = 'none';
        }

        if (event.target === teamMembersModal) {
            teamMembersModal.style.display = 'none';
        }
    });

    function openTeamMembersModal() {
        document.getElementById('teamMembersModal').style.display = 'flex';
    }

    // Close Team Members Modal
    function closeTeamMembersModal() {
        document.getElementById('teamMembersModal').style.display = 'none';
    }

    // Open Member Analysis Modal
    function openMemberAnalysisModal(memberId) {
        // Fetch member analysis data
        fetch(`/team/${teamId}/member-analysis/${memberId}/`)
            .then(response => response.json())
            .then(data => {
                // Update modal content with fetched data
                document.getElementById('memberAnalysisTitle').innerText = `👤 ${data.member.username}'s Analysis`;
                document.getElementById('memberAnalysisContent').innerHTML = `
                    <p><strong>Total Tasks:</strong> ${data.total_tasks}</p>
                    <p><strong>Completed Tasks:</strong> ${data.completed_tasks}</p>
                    <p><strong>Pending Tasks:</strong> ${data.pending_tasks}</p>
                    <p><strong>In Progress Tasks:</strong> ${data.in_progress_tasks}</p>
                    <p><strong>Overdue Tasks:</strong> ${data.overdue_tasks}</p>
                    <p><strong>Score:</strong> ${data.score}</p>
                    <p><strong>Average Completion Time:</strong> ${data.average_completion_time || 'N/A'}</p>
                `;
                // Display the modal
                document.getElementById('memberAnalysisModal').style.display = 'flex';
            })
            .catch(error => {
                console.error('Error fetching member analysis:', error);
                document.getElementById('memberAnalysisContent').innerHTML = '<p>Error loading analysis. Please try again.</p>';
            });
    }

    // Close Member Analysis Modal
    function closeMemberAnalysisModal() {
        document.getElementById('memberAnalysisModal').style.display = 'none';
    }

    // Attach click event to member links
    document.addEventListener('DOMContentLoaded', () => {
        const memberLinks = document.querySelectorAll('.member-link');
        memberLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const memberId = link.getAttribute('data-member-id');
                openMemberAnalysisModal(memberId);
            });
        });
    });

    // Close modals when clicking outside
    window.addEventListener('click', (event) => {
        const teamMembersModal = document.getElementById('teamMembersModal');
        const memberAnalysisModal = document.getElementById('memberAnalysisModal');
        if (event.target === teamMembersModal) {
            closeTeamMembersModal();
        }
        if (event.target === memberAnalysisModal) {
            closeMemberAnalysisModal();
        }
    });
</script>
