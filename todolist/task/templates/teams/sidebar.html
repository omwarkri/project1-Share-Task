<!-- templates/task/sidebar.html -->
<div class="team-sidebar">
    <div class="team-sidebar-header">
        <h2>📋</h2> <!-- Main symbol for the app -->
    </div>
    <ul class="team-sidebar-links">
        <li>
            <a href="{% url 'teams_list' %}" title="All Teams">
                🏠 <!-- Home symbol for all teams -->
            </a>
        </li>
        <li>
            <a href="#" onclick="openAddTaskModal()" title="Create Task">
                ➕ <!-- Add symbol for creating a task -->
            </a>
        </li>
        <li>
            <a href="{% url 'leaderboard' %}" title="Leaderboard">
                🏆 <!-- Leaderboard symbol -->
            </a>
        </li>
        <li>
            <a href="#" onclick="openTeamMembersModal()" title="Team Members">
                👥 <!-- Team symbol -->
            </a>
        </li>
    </ul>
</div>

<!-- Add Task Modal -->
<div id="taskModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add Task</h3>
            <span class="close" onclick="closeAddTaskModal()">&times;</span>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ task_form.as_p }}
            <button type="submit" name="add_task">Create Task</button>
        </form>
    </div>
</div>

<!-- Team Members Modal -->
<div id="teamMembersModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeTeamMembersModal()">&times;</span>
        <h3>👥 Team Members</h3>
        <div class="team-members-list">
            <ul>
                {% for member in team.members.all %}
                    <li>{{ member.username }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>

<style>
    .team-sidebar {
        width: 80px; /* Narrow sidebar for icons */
        background-color: #e4fff9; /* Light background */
        padding: 10px;
        border-right: 1px solid #ccffeea1;
        height: 100vh; /* Full height */
        position: fixed; /* Fixed position */
        left: 0;
        top: 0;
        overflow-y: auto; /* Scrollable if content overflows */
    }

    .team-sidebar-header {
        text-align: center;
        margin-bottom: 20px;
    }

    .team-sidebar-header h2 {
        color: #333; /* Dark text for the header */
        font-size: 24px;
    }

    .team-sidebar-links {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    .team-sidebar-links li {
        margin-bottom: 20px;
        text-align: center;
    }

    .team-sidebar-links li a {
        color: #333; /* Dark text for links */
        text-decoration: none;
        font-size: 24px;
        display: block;
        transition: transform 0.2s ease, color 0.2s ease;
    }

    .team-sidebar-links li a:hover {
        transform: scale(1.2); /* Slightly enlarge on hover */
        color: #16a085; /* Teal color for hover */
    }

    .team-sidebar-links li a[title]:hover::after {
        content: attr(title);
        position: absolute;
        background-color: #333;
        color: #fff;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 14px;
        margin-left: 10px;
        white-space: nowrap;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .modal-header h3 {
        margin: 0;
    }

    .close, .close-modal {
        cursor: pointer;
        font-size: 24px;
        color: #666;
    }

    .close:hover, .close-modal:hover {
        color: #333;
    }

    .team-members-list {
        margin-top: 20px;
    }

    .team-members-list ul {
        list-style-type: none;
        padding: 0;
    }

    .team-members-list li {
        padding: 10px;
        margin-bottom: 10px;
        background-color: #f9f9f9;
        border-radius: 8px;
        transition: background-color 0.3s ease;
    }

    .team-members-list li:hover {
        background-color: #f0f0f0;
    }
</style>

<script>
    function openAddTaskModal() {
        const taskModal = document.getElementById('taskModal');
        taskModal.style.display = 'flex';
    }

    function closeAddTaskModal() {
        const taskModal = document.getElementById('taskModal');
        taskModal.style.display = 'none';
    }

    function openTeamMembersModal() {
        const teamMembersModal = document.getElementById('teamMembersModal');
        teamMembersModal.style.display = 'flex';
    }

    function closeTeamMembersModal() {
        const teamMembersModal = document.getElementById('teamMembersModal');
        teamMembersModal.style.display = 'none';
    }

    // Close modals when clicking outside the modal
    window.addEventListener('click', (event) => {
        const taskModal = document.getElementById('taskModal');
        const teamMembersModal = document.getElementById('teamMembersModal');

        if (event.target === taskModal) {
            taskModal.style.display = 'none';
        }

        if (event.target === teamMembersModal) {
            teamMembersModal.style.display = 'none';
        }
    });
</script>
