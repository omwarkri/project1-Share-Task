<!DOCTYPE html>
<html>
<head>
  <title>Task Confirmation</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .confirm-box {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h2 {
      color:  #1abc9c;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      font-size: 16px;
      margin-bottom: 30px;
    }

    button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color:  #109c80;
    }

    .subtask-item, .microtask-item {
      background: #ffffff;
      border-radius: 8px;
      padding: 10px;
      margin: 10px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .task-action {
      background-color: #1abc9c;
      color: white;
      border: none;
      padding: 8px 12px;
      margin-top: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .task-action:hover {
      background-color: #109c80;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #34dbc2;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="confirm-box">
    <h2>{{ task.title }}</h2>
    <p>{{ task.description }}</p>

    <div id="subtaskSection">
      <p>No subtasks yet. 🤖</p>
      <button class="task-action" onclick="generateAISubtasks({{ task.id }})">Generate Subtasks</button>
    </div>

    <div class="loader" id="loader"></div>

    <form method="POST">
      {% csrf_token %}
      <button type="submit">Go to Dashboard</button>
    </form>
  </div>
