<!DOCTYPE html>
<html>
<head>
  <title>Onboarding – Goal & Interest</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    body.loaded {
      opacity: 1;
      transform: translateY(0);
    }

    .form-container {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333333;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: #007bff;
      outline: none;
    }

    button {
      width: 100%;
      background-color:  #1abc9c;
      color: white;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color:   #1abc9c;
    }

    /* Progress Steps */
    .progress-steps {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ddd;
      transition: all 0.3s ease;
    }

    .step.active {
      background-color: #1abc9c;
      transform: scale(1.2);
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="progress-steps">
      <div class="step active"></div>
      <div class="step "></div>
      <div class="step "></div>
      <div class="step"></div>
    </div>
    <h2>What's your goal and interest?</h2>
    <form method="POST" onsubmit="fadeOutPage()">
      {% csrf_token %}
      
      <label for="goal">Goal</label>
      <input type="text" name="goal" id="goal" required>

      <label for="interest">Interest</label>
      <input type="text" name="interest" id="interest" required>

      <button type="submit">Continue</button>
    </form>
  </div>

  <script>
    // On page load animation
    window.addEventListener("load", () => {
      document.body.classList.add("loaded");
    });

    // On form submit animation
    function fadeOutPage() {
      document.body.style.transition = "opacity 0.5s ease";
      document.body.style.opacity = 0;
    }
  </script>

</body>
</html>
