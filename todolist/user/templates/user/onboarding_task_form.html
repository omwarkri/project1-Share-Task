<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finalize Your Task</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;

      /* Animation on load */
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    body.loaded {
      opacity: 1;
      transform: translateY(0);
    }

    .form-box {
      background-color: #ffffff;
      padding: 20px 25px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      color: #333333;
      margin-bottom: 20px;
      font-size: 20px;
    }

    form label {
      font-weight: 600;
      color: #444444;
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 15px;
      border: 1px solid #cccccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="checkbox"],
    input[type="radio"] {
      width: auto;
      margin-right: 6px;
    }

    button {
      width: 100%;
      background-color:  #1abc9c;
      color: white;
      padding: 10px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    @media (max-width: 480px) {
      .form-box {
        padding: 15px 20px;
      }

      h2 {
        font-size: 18px;
      }

      button {
        font-size: 14px;
      }
    }
       /* Progress Steps */
    .progress-steps {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ddd;
      transition: all 0.3s ease;
    }

    .step.active {
      background-color: #1abc9c;
      transform: scale(1.2);
    }

  </style>
</head>
<body>

  <div class="form-box">
     <div class="progress-steps">
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step"></div>
    </div>
    <h2>Finalize Your Task</h2>
    <form method="POST" onsubmit="fadeOutPage()">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save Task</button>
    </form>
  </div>

  <script>
    // Trigger page load animation
    window.addEventListener("load", () => {
      document.body.classList.add("loaded");
    });

    // Trigger fade-out animation on submit
    function fadeOutPage() {
      document.body.style.transition = "opacity 0.5s ease";
      document.body.style.opacity = 0;
    }
  </script>

</body>
</html>
